    </svg>
  );
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10" fill="#1877F2" />
      <path d="M15.3 12.4l.4-2.6h-2.5V8.1c0-.7.35-1.4 1.45-1.4h1.15V4.5s-1-.2-2-.2c-2 0-3.35 1.25-3.35 3.5v1.97H8.1v2.6h2.3V19h2.8v-6.6z" fill="#fff" />
    </svg>
  );
}
function YouTubeBadge({ size = 30, mono = false }) {
  if (mono) return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">
      <rect x="2.3" y="5.4" width="19.4" height="13.2" rx="4" fill="none" stroke="#fff" strokeWidth="1.8" />
      <path d="M10.3 9.1v5.8L15.3 12z" fill="#fff" />
    </svg>
  );
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">
      <rect x="1.5" y="5" width="21" height="14" rx="4.2" fill="#FF0000" />
      <path d="M10 8.6v6.8L16 12z" fill="#fff" />
    </svg>
  );
}
const NET = {
  tiktok:    { Badge: TikTokBadge,    name: "TikTok",    handle: "@cumbayavillage", href: "https://www.tiktok.com/@cumbayavillage", ring: "#111111" },
  instagram: { Badge: InstagramBadge, name: "Instagram", handle: "@cumbayavillage", href: "https://www.instagram.com/cumbayavillage", ring: "#D6306F" },
  facebook:  { Badge: FacebookBadge,  name: "Facebook",  handle: "Cumbayá Village", href: "https://www.facebook.com/cumbayavillage", ring: "#1877F2" },
  youtube:   { Badge: YouTubeBadge,   name: "YouTube",   handle: "@cumbayavillage", href: "https://www.youtube.com/@cumbayavillage", ring: "#FF0000" },
};

/* posts shown in the coverflow */
const POSTS = [
  { id: "soc1", net: "instagram", tag: "Reel · paseo a la laguna" },
  { id: "soc2", net: "tiktok",    tag: "Día de musicoterapia" },
  { id: "soc3", net: "facebook",  tag: "Cumpleaños del mes" },
  { id: "soc4", net: "instagram", tag: "Mañana en el jardín" },
  { id: "soc5", net: "tiktok",    tag: "Baile y ejercicio" },
  { id: "soc6", net: "facebook",  tag: "Visita de familias" },
  { id: "soc7", net: "instagram", tag: "Arteterapia" },
];

/* ============================================================
   Phone-coverflow carousel
   ============================================================ */
function SocialCarousel() {
  const n = POSTS.length;
  const [active, setActive] = useStateS(0);
  const [paused, setPaused] = useStateS(false);
  const touch = useRefS({ x: 0 });

  useEffectS(() => {
    if (paused) return;
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const t = setInterval(() => setActive((a) => (a + 1) % n), 3600);
    return () => clearInterval(t);
  }, [paused, n]);

  const go = (d) => setActive((a) => (a + d + n) % n);
  // step one position toward a clicked card so the carousel advances one by one
  const stepTo = (i) => {
    let off = i - active;
    if (off > n / 2) off -= n;
    if (off < -n / 2) off += n;
    if (off !== 0) go(off > 0 ? 1 : -1);
  };
  const activeNet = POSTS[active].net;

  const cardStyle = (i) => {
    let off = i - active;
    if (off > n / 2) off -= n;
    if (off < -n / 2) off += n;
    const abs = Math.abs(off);
    const x = off * 290;
    const scale = abs === 0 ? 1.06 : abs === 1 ? 0.9 : 0.74;
    const rot = -off * 15;
    const op = abs > 2 ? 0 : abs === 2 ? 0.5 : 1;
    // Layered drop shadow scaled by depth: the active phone lifts forward with
    // a big soft shadow, side phones cast tighter ones so the row reads as 3D.
    const ring = "inset 0 0 0 1.5px rgba(255,255,255,.12), inset 0 0 0 3px rgba(0,0,0,.38)";
    const drop = abs === 0
      ? "0 48px 96px rgba(10,18,34,.52), 0 20px 42px rgba(10,18,34,.40)"
      : abs === 1
      ? "0 30px 60px rgba(10,18,34,.34)"
      : "0 18px 36px rgba(10,18,34,.22)";
    return {
      transform: `translate(-50%, -50%) translateX(${x}px) scale(${scale}) rotateY(${rot}deg)`,
      opacity: op,
      zIndex: 30 - abs,
      pointerEvents: abs > 2 ? "none" : "auto",
      filter: abs === 0 ? "none" : "brightness(.86) saturate(.92)",
      boxShadow: `${drop}, ${ring}`,
    };
  };

  return (
    <section className="section social" id="redes"
             onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      <div className="social__glow" aria-hidden="true"></div>
      <div className="wrap">
        <SectionHead center kicker="Síguenos en redes"
          title={<>La vida en Cumbayá Village, día a día</>}
          lead="Sonrisas, paseos, celebraciones y pequeños grandes momentos. Así se vive aquí: síguenos y sé parte de nuestra comunidad." />

        <Reveal className="social__nets" delay={120}>
          {Object.entries(NET).map(([key, net]) => {
            const Badge = net.Badge;
            const isActive = key === activeNet;
            return (
              <a key={key} href={net.href} target="_blank" rel="noopener"
                 className={`social__net ${isActive ? "is-active" : ""}`}
                 style={{ "--ring": net.ring }}
                 aria-label={net.name}
                 onMouseEnter={() => {
                   const idx = POSTS.findIndex((p) => p.net === key);
                   if (idx >= 0) setActive(idx);
                 }}>
                <span className="social__net-badge"><Badge size={34} /></span>
              </a>
            );
          })}
        </Reveal>
      </div>

      <Reveal fade delay={200} className="social__stage-wrap">
        <div className="social__stage"
             onTouchStart={(e) => { touch.current.x = e.touches[0].clientX; }}
             onTouchEnd={(e) => {
               const dx = e.changedTouches[0].clientX - touch.current.x;
               if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
             }}>
          {POSTS.map((p, i) => {
            const net = NET[p.net];
            const Badge = net.Badge;
            return (
              <div key={p.id} className="phone" style={cardStyle(i)} onClick={() => stepTo(i)}>
                <div className="phone__notch"></div>
                <div className="phone__screen">
                  <Slot id={p.id} radius={26} placeholder={`${net.name} — ${p.tag}`} style={{ height: "100%" }} />
                  <span className="phone__net" style={{ "--ring": net.ring }}><Badge size={18} /></span>
                  <span className="phone__tag">{p.tag}</span>
                </div>
              </div>
            );
          })}
        </div>
      </Reveal>

      <div className="wrap social__dots-wrap">
        <div className="social__dots">
          {POSTS.map((p, i) => (
            <button key={p.id} className={`social__dot ${i === active ? "is-active" : ""}`}
                    style={{ "--ring": NET[p.net].ring }} onClick={() => setActive(i)} aria-label={`Ir a ${i + 1}`} />
          ))}
        </div>
      </div>
    </section>
  );
}

Object.assign(window, { SocialCarousel, NET, POSTS });

  </script>

  <!-- app.jsx -->
  <script type="text/babel" data-module="app.jsx">
/* global React, ReactDOM, useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakColor, TweakToggle,
   Nav, FloatingWA, HEROES, Intro, StatsBar, Services, Features, Instalaciones, CareGrid, Testimonials, SocialCarousel, CTABand, Footer */
const { useEffect, useState: useStateApp } = React;

function parseHash() {
  const m = (window.location.hash || "").match(/^#\/servicio\/([\w-]+)/);
  return m && SERVICE_DETAILS[m[1]] ? m[1] : null;
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "editorial",
  "accent": "#3f6f93",
  "surface": "crema",
  "motion": true
}/*EDITMODE-END*/;

const ACCENTS = {
  "#3f6f93": { c: "#3f6f93", c6: "#335d7d", c3: "#7faccb", tint: "#e4edf3" }, // Azul CV (brand)
  "#5c7b67": { c: "#5c7b67", c6: "#4d6a58", c3: "#8aa593", tint: "#e7ede7" }, // sage
  "#3d7a80": { c: "#3d7a80", c6: "#336a6f", c3: "#7da9ad", tint: "#e2ecec" }, // eucalyptus blue
  "#b0714e": { c: "#b0714e", c6: "#985f3f", c3: "#ce9d80", tint: "#f1e4da" }, // terracotta
  "#9c7d3e": { c: "#9c7d3e", c6: "#856a32", c3: "#c2ac7d", tint: "#efe8d6" }, // warm gold
};

const SURFACES = {
  crema:  { paper: "#f6f2ea", paper2: "#efe9df", card: "#fffdf8", line: "#e3dccf" },
  gris:   { paper: "#f3f4f6", paper2: "#eceef1", card: "#ffffff", line: "#e4e7eb" },
  blanco: { paper: "#ffffff", paper2: "#f6f6f4", card: "#ffffff", line: "#ececec" },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [serviceId, setServiceId] = useStateApp(parseHash);

  // Re-render una vez cuando el contenido remoto (Firestore) termina de cargar.
  const [, bumpCms] = React.useState(0);
  useEffect(() => {
    if (!window.CMS) return;
    return window.CMS.subscribe(() => bumpCms((n) => n + 1));
  }, []);

  useEffect(() => {
    const onHash = () => { setServiceId(parseHash()); window.scrollTo({ top: 0, left: 0, behavior: "instant" }); };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  useEffect(() => {
    const r = document.documentElement.style;
    const a = ACCENTS[t.accent] || ACCENTS["#3f6f93"];
    r.setProperty("--accent", a.c);
    r.setProperty("--accent-600", a.c6);
    r.setProperty("--accent-300", a.c3);
    r.setProperty("--accent-tint", a.tint);
    const s = SURFACES[t.surface] || SURFACES.crema;
    r.setProperty("--paper", s.paper);
    r.setProperty("--paper-2", s.paper2);
    r.setProperty("--card", s.card);
    r.setProperty("--line", s.line);
  }, [t.accent, t.surface]);

  useEffect(() => {
    document.body.classList.toggle("no-motion", !t.motion);
  }, [t.motion]);

  const Hero = HEROES[t.hero] || HEROES.editorial;

  return (
    <React.Fragment>
      <Nav />
      {serviceId ? (
        <ServiceDetailMain id={serviceId} />
      ) : (
        <main>
          <Hero key={t.hero} />
          <StatsBar />
          <Intro />
          <Services />
          <SilverConcierge />
          <Instalaciones />
          <Features />
          <CareGrid />
          <Testimonials />
          <SocialCarousel />
          <CTABand />
        </main>
      )}
      <Footer />
      <FloatingWA />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero" />
        <TweakRadio label="Dirección" value={t.hero}
          options={[{value:"editorial",label:"Editorial"},{value:"cinematic",label:"Cinematográfico"},{value:"estructurado",label:"Estructurado"}]}
          onChange={(v) => setTweak("hero", v)} />
        <TweakSection label="Apariencia" />
        <TweakColor label="Color de acento" value={t.accent}
          options={["#3f6f93", "#5c7b67", "#b0714e", "#9c7d3e"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakRadio label="Fondo" value={t.surface}
          options={[{value:"crema",label:"Crema"},{value:"gris",label:"Gris"},{value:"blanco",label:"Blanco"}]}
          onChange={(v) => setTweak("surface", v)} />
        <TweakSection label="Movimiento" />
        <TweakToggle label="Animaciones" value={t.motion} onChange={(v) => setTweak("motion", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
